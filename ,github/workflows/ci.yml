---
name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install ansible-lint yamllint ruff black

      - name: yamllint
        run: yamllint .

      - name: ruff
        run: ruff check src/

      - name: black
        run: black --check src/

      - name: ansible-lint
        run: ansible-lint ansible/
